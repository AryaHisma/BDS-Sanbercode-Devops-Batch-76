name: CI/CD Pipeline Production

on:
  push:
    branches:
      - main

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build # Menghasilkan folder dist/

      # Tahap krusial: Upload artifact agar bisa diunduh oleh job deploy
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-build-web
          path: dist/

  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: build-app # Mewajibkan job build sukses dulu sebelum deploy jalan
    steps:
      # 1. Mengunduh hasil "masakan" (Artifact)
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: hasil-build-web
          path: dist/

      # 2. Kurir mengirim barang ke VPS menggunakan SCP Action
      - name: Copy Artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/aplikasi-saya" # Sesuaikan path di VPS kalian
          strip_components: 1 # Penting agar isi folder dist langsung masuk ke target

      # 3. Masuk ke VPS dan Restart Service
      - name: Execute Restart Command via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Memulai proses restart service di VPS..."
            # Verifikasi file yang masuk
            ls -la /var/www/aplikasi-saya
            echo "Deployment Production Sukses!"

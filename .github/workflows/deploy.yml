name: CI/CD Pipeline Production

on:
  push:
    branches:
      - main

jobs:
  # Job Build
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install
          npm run build --if-present 
          # Pastikan folder dist tersedia untuk di-upload
          mkdir -p dist
          echo "Build sukses pada $(date)" > dist/index.html

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-build-web
          path: dist/

  # Job Deploy
  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      # 1. Mengunduh artifact
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: hasil-build-web
          path: dist/

      # 2. Transfer ke VPS dengan Port 1990 dan Secret MY_KEY
      - name: Copy Artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.MY_KEY }} # Menggunakan nama secret kamu
          port: 1990                # Menggunakan port custom kamu
          source: "dist/*"
          target: "/var/www/aplikasi-saya"
          strip_components: 1

      # 3. Eksekusi SSH dengan Port 1990 dan Secret MY_KEY
      - name: Execute SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.MY_KEY }} # Menggunakan nama secret kamu
          port: 1990                # Menggunakan port custom kamu
          script: |
            echo "Deployment Selesai!"
            ls -la /var/www/aplikasi-saya

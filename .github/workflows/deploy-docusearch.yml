name: Deploy DocuSearch-AI to VPS

on:
  push:
    branches:
      - main # Jalankan otomatis jika ada push ke branch main
    paths:
      - 'DocuSearch-AI/**' # Hanya jalankan jika ada perubahan di folder DocuSearch-AI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Frontend Dependencies & Build
      run: |
        cd DocuSearch-AI
        npm install
        npm run build

    - name: Prepare Deployment Package
      run: |
        mkdir -p deploy-package
        cp -r DocuSearch-AI/dist deploy-package/
        cp -r DocuSearch-AI/backend deploy-package/

    - name: Deploy to VPS via SSH
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        source: "deploy-package/*"
        target: "/var/www/docusearch"
        strip_components: 1

    - name: Execute Deployment Commands on VPS
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /var/www/docusearch/backend
          
          # Buat file .env menggunakan GitHub Secrets
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          
          # Install dependensi backend
          npm install --production
          
          # Mulai atau restart PM2 (menggunakan ecosystem file untuk manajemen RAM)
          pm2 start ecosystem.config.cjs || pm2 restart docusearch-backend
          pm2 save

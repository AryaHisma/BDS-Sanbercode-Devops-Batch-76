# File Konfigurasi Nginx untuk DocuSearch-AI
# Simpan file ini di VPS Anda (misalnya di /etc/nginx/sites-available/docusearch)
# Kemudian buat symlink ke sites-enabled dan restart nginx.

server {
    listen 80;
    server_name docusearch.domain-anda.com; # GANTI dengan domain/subdomain Anda

    # GANTI dengan path absolut ke folder dist hasil build React di VPS Anda
    root /var/www/docusearch/dist; 
    index index.html;

    # Konfigurasi Frontend (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Konfigurasi Backend (Reverse Proxy)
    location /api/ {
        proxy_pass http://localhost:3001; # Arahkan ke backend yang dijalankan PM2
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Pengaturan upload file besar untuk multer
        client_max_body_size 10M;
    }
}
